name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Least privilege：預設只讀 repo。需要 OIDC（id-token）的 CD job 各自於 job 層覆寫。
permissions:
  contents: read

# 同 branch / 同 PR 新 push 自動 cancel 前面尚未完成的 run，節省 Actions minutes。
# main 不互相 cancel（避免部署中途被打斷）。
concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  GO_VERSION: '1.25'
  # v2.x 必要：v1.61 依賴 x/tools@v0.23 含 Go 1.24+ 禁止的負數陣列長度，build 不過。
  GOLANGCI_LINT_VERSION: v2.5.0
  REDOCLY_VERSION: 1.25.0
  GOVULNCHECK_VERSION: latest
  GOSEC_VERSION: latest
  # ── CD（對齊前端 PlayerLedgerFrontend/.github/workflows/ci.yml 設定）──
  IMAGE_NAME: igs_backend
  AWS_REGION: ap-southeast-2
  ECS_CLUSTER: warmhearted-crocodile-18gqvo-jko-cluster
  ECS_SERVICE: igs-backend-service-oykicrri
  CONTAINER_NAME: backend

jobs:
  # ════════════════════════════ CI ════════════════════════════
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      # v7 才支援 golangci-lint v2.x；v6 只支援 v1.x
      - uses: golangci/golangci-lint-action@v7
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}

  schema-lint:
    name: OpenAPI Schema Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npx -y @redocly/cli@${{ env.REDOCLY_VERSION }} lint schema/openapi.yaml

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Run unit tests
        run: go test -race -count=1 -coverprofile=coverage.out ./...
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
          flags: unit

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: playerledger_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_HOST: localhost
      DB_PORT: 5433
      DB_USER: test
      DB_PASSWORD: test
      DB_NAME: playerledger_test
      DB_SSLMODE: disable
      REDIS_HOST: localhost
      REDIS_PORT: 6380
      REDIS_PASSWORD: ""
      REDIS_DB: 0
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Run integration tests
        run: go test -race -count=1 -tags integration -coverprofile=coverage.out ./...
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
          flags: integration

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@${{ env.GOVULNCHECK_VERSION }}
          govulncheck ./...
      - name: gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@${{ env.GOSEC_VERSION }}
          gosec ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, schema-lint, test-unit, test-integration, security]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Build binary
        run: go build ./cmd/server/...

  # ════════════════════════════ CD ════════════════════════════
  # 只在 main push / 手動觸發；PR 不部署。CI 全綠後才接續。
  build-image:
    name: Build & Push Image
    needs: [lint, schema-lint, test-unit, test-integration, security, build]
    if: ${{ github.ref == 'refs/heads/main' && github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      image-uri: ${{ steps.image.outputs.uri }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.ecr-login.outputs.registry }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ github.sha }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push (with SBOM + provenance)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            VERSION=${{ github.sha }}
            COMMIT=${{ github.sha }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true
          provenance: mode=max
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set image URI
        id: image
        run: echo "uri=${{ steps.ecr-login.outputs.registry }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

  deploy-staging:
    name: Deploy to Staging
    needs: build-image
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # 同前端：committed task def 的 placeholder 於部署時以 sed 填入（帳號/region/VM IP）。
      # image 由下一步 render 覆寫，這裡不處理。
      - name: Substitute placeholders in task definition
        run: |
          sed -i \
            -e "s/ACCOUNT/${{ secrets.AWS_ACCOUNT_ID }}/g" \
            -e "s/REGION/${{ env.AWS_REGION }}/g" \
            -e "s/EC2_PRIVATE_IP/${{ vars.EC2_PRIVATE_IP }}/g" \
            .aws/ecs-task-definition.json

      - name: Render new image into task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: .aws/ecs-task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ needs.build-image.outputs.image-uri }}

      - name: Deploy to ECS (Staging)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          cluster: ${{ env.ECS_CLUSTER }}
          service: ${{ env.ECS_SERVICE }}
          wait-for-service-stability: true
      # 後端是內部 only（無公網 ALB），不做 public health check；
      # 以 wait-for-service-stability 判定 task 是否健康上線。

  # ════════════════════════ Seed (staging) ════════════════════════
  # 部署完成後，於 VPC 內以「一次性 ECS run-task」把 staging 資料表 drop 後重新倒入假資料。
  # 具破壞性：每次 main 部署都會清空 staging DB 後重灌 20 members + 50 隨機 deposit_records。
  #
  # 設計（in-VPC，解決內網 PG 不可達）：
  #   - 複用 backend task definition「igs-backend」最新 revision（含本次新 image 的 /app/seed）。
  #     → 自動繼承 task def 的 DB_HOST/DB_USER/DB_NAME + Secrets Manager 的 DB_PASSWORD/ADMIN_*，
  #       不需任何 SEED_DB_* GitHub secrets。
  #   - override container command=/app/seed、加 SEED_RESET=true（APP_ENV=staging 已在 task def，
  #     cmd/seed 對 prod 一律中止）。
  #   - 網路設定（subnet/SG/assignPublicIp）直接讀 .aws/service-backend.json，與 service 一致 →
  #     task 在 VPC 內連得到私有 PG。
  #
  # 前置（IAM）：AWS_DEPLOY_ROLE_ARN 需具備 ecs:RunTask、ecs:DescribeTasks，
  #   以及對 task role / execution role（jko_ecs）的 iam:PassRole 權限。
  seed-db:
    name: Reset & Seed Database (Staging, in-VPC ECS task)
    needs: deploy-staging
    if: ${{ github.ref == 'refs/heads/main' && github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run seed as one-off ECS task (drop + reseed)
        run: |
          set -euo pipefail
          # 網路設定與 service 一致（同 subnet / SG / assignPublicIp），確保連得到私有 PG
          NETCFG=$(jq -c '.networkConfiguration' .aws/service-backend.json)
          OVERRIDES=$(jq -nc --arg c "${CONTAINER_NAME}" \
            '{containerOverrides:[{name:$c,command:["/app/seed"],environment:[{name:"SEED_RESET",value:"true"}]}]}')

          TASK_ARN=$(aws ecs run-task \
            --cluster "${ECS_CLUSTER}" \
            --task-definition igs-backend \
            --launch-type FARGATE \
            --network-configuration "${NETCFG}" \
            --overrides "${OVERRIDES}" \
            --query 'tasks[0].taskArn' --output text)

          if [ -z "${TASK_ARN}" ] || [ "${TASK_ARN}" = "None" ]; then
            echo "::error::run-task 未能啟動 task"; exit 1
          fi
          echo "seed task: ${TASK_ARN}"

          if ! aws ecs wait tasks-stopped --cluster "${ECS_CLUSTER}" --tasks "${TASK_ARN}"; then
            echo "::error::等待 task 停止超時；當前狀態："
            aws ecs describe-tasks --cluster "${ECS_CLUSTER}" --tasks "${TASK_ARN}" \
              --query 'tasks[0].{lastStatus:lastStatus,stoppedReason:stoppedReason,containers:containers[].{lastStatus:lastStatus,exitCode:exitCode,reason:reason}}'
            exit 1
          fi

          EXIT=$(aws ecs describe-tasks --cluster "${ECS_CLUSTER}" --tasks "${TASK_ARN}" \
            --query 'tasks[0].containers[0].exitCode' --output text)
          REASON=$(aws ecs describe-tasks --cluster "${ECS_CLUSTER}" --tasks "${TASK_ARN}" \
            --query 'tasks[0].stoppedReason' --output text)
          echo "exit code: ${EXIT} / stoppedReason: ${REASON}"
          [ "${EXIT}" = "0" ] || { echo "::error::seed task 失敗（見 CloudWatch /ecs/igs-backend）"; exit 1; }
