name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege：CI 預設只能讀 repo，無法 push/create issues 等。
# 若日後加 release job 等需寫權限，在該 job 內覆寫 permissions。
permissions:
  contents: read

# 同 branch / 同 PR 新 push 自動 cancel 前面尚未完成的 run，節省 Actions minutes。
# main 與其他分支分組（main push 不互相 cancel，避免 release 中斷）。
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  GO_VERSION: '1.25'
  # v2.x 必要：v1.61 依賴 x/tools@v0.23 含 Go 1.24+ 禁止的負數陣列長度，build 不過。
  # v2 config 格式不同（version: "2" + linters.settings + formatters 分離），見 .golangci.yml
  GOLANGCI_LINT_VERSION: v2.5.0
  REDOCLY_VERSION: 1.25.0
  GOVULNCHECK_VERSION: v1.1.3
  GOSEC_VERSION: v2.21.4

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      # v7 才支援 golangci-lint v2.x；v6 只支援 v1.x
      - uses: golangci/golangci-lint-action@v7
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}

  schema-lint:
    name: OpenAPI Schema Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npx -y @redocly/cli@${{ env.REDOCLY_VERSION }} lint schema/openapi.yaml

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Run unit tests
        run: go test -race -count=1 -coverprofile=coverage.out ./...
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
          flags: unit

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: playerledger_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_HOST: localhost
      DB_PORT: 5433
      DB_USER: test
      DB_PASSWORD: test
      DB_NAME: playerledger_test
      DB_SSLMODE: disable
      REDIS_HOST: localhost
      REDIS_PORT: 6380
      REDIS_PASSWORD: ""
      REDIS_DB: 0
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Run integration tests
        run: go test -race -count=1 -tags integration -coverprofile=coverage.out ./...
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
          flags: integration

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      # govulncheck 與 gosec 都用 `go install` — 統一從 env 取版本，
      # 避免「uses: 不支援 env context」的限制；且不需第三方 action 信任。
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@${{ env.GOVULNCHECK_VERSION }}
          govulncheck ./...
      - name: gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@${{ env.GOSEC_VERSION }}
          gosec ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, schema-lint, test-unit, test-integration, security]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Build binary
        run: go build ./cmd/server/...
