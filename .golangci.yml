# golangci-lint v2.x 設定（v1 → v2 升級於 2026-06；v1 config 已不相容）。
# Migration 重點：
#   - 頂層 `version: "2"` 必填
#   - `linters.enable` 與 `linters.settings` 改為巢狀
#   - formatter (gofmt / goimports) 從 linters 移出，獨立 `formatters:` 區塊
#   - `issues.exclude-rules` 移至 `linters.exclusions.rules`
#   - `gosimple` 已併入 `staticcheck`（不再單獨列出）
#   - `unused` 仍可單獨列出；亦被 staticcheck umbrella 涵蓋

version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck     # 含原 gosimple / stylecheck / unused 規則
    - misspell
    - bodyclose
    - noctx
    - revive
    - gocritic
  settings:
    errcheck:
      check-type-assertions: true
    revive:
      # v2 revive 預設啟用更多規則，部分（exported / package-comments / unused-parameter）
      # 要求對既有 codebase 大量補註解，超出 lint 修正 scope；先 disable，未來逐步補完。
      rules:
        - { name: exported,          disabled: true }
        - { name: package-comments,  disabled: true }
        - { name: unused-parameter,  disabled: true }
  exclusions:
    rules:
      - path: "_test\\.go$"
        linters: [errcheck, bodyclose]

formatters:
  enable:
    - gofmt
    - goimports
